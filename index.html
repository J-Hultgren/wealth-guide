*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#FAFAF8;color:#1C1C1E;min-height:100vh;overflow-x:hidden}
#root{min-height:100vh;display:flex;flex-direction:column}
.screen{flex:1;overflow-y:auto;padding-bottom:80px}
/* bottom nav */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #e5e5e5;display:flex;height:64px;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border:none;background:none;cursor:pointer;padding:8px 0}
.nav-btn .icon{font-size:22px;line-height:1}
.nav-btn .label{font-size:10px;font-weight:600;letter-spacing:.02em}
/* progress ring */
.ring-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring-center{position:absolute;text-align:center}
/* cards */
.card{background:#fff;border-radius:16px;padding:16px;margin:0 16px 12px;box-shadow:0 1px 3px rgba(0,0,0,.06),0 1px 8px rgba(0,0,0,.04)}
.step-card{background:#fff;border-radius:14px;margin:0 16px 10px;box-shadow:0 1px 3px rgba(0,0,0,.06);overflow:hidden;transition:all .2s}
.step-header{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;user-select:none}
.step-body{padding:0 16px 16px}
.sub-step{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid #f5f5f5}
.sub-step:last-child{border-bottom:none}
.cb{width:22px;height:22px;border-radius:6px;border:2px solid #ddd;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;transition:all .15s;margin-top:1px}
.cb.done{border-color:#1A4A42;background:#1A4A42}
.chip{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;padding:3px 8px;border-radius:20px}
.pill{font-size:10px;font-weight:700;padding:2px 8px;border-radius:12px}
/* animations */
@keyframes pop{0%{transform:scale(0.8);opacity:0}60%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
@keyframes slideup{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.pop{animation:pop .3s ease forwards}
.slideup{animation:slideup .3s ease forwards}

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function fmt(n){return n>=1000?`$${(n/1000).toFixed(n%1000===0?0:1)}K`:`$${n}`}
function phaseOf(stepId){return PHASES.find(p=>p.steps&&false)||PHASES.find(p=>STEPS.find(s=>s.id===stepId)?.phase===p.id)}
function getPhaseColor(phaseId){return PHASES.find(p=>p.id===phaseId)?.color||"#1A4A42"}
function getPhaseLight(phaseId){return PHASES.find(p=>p.id===phaseId)?.light||"#EEF7F5"}

// Progress ring SVG component
function Ring({pct,size=120,stroke=10,color="#1A4A42",children}){
  const r=size/2-stroke/2, circ=2*Math.PI*r, offset=circ*(1-pct);
  return(
    <div style={{position:"relative",width:size,height:size}}>
      <svg width={size} height={size} style={{transform:"rotate(-90deg)"}}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#E5E5EA" strokeWidth={stroke}/>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke}
          strokeDasharray={circ} strokeDashoffset={offset} strokeLinecap="round"
          style={{transition:"stroke-dashoffset 0.6s ease"}}/>
      </svg>
      <div style={{position:"absolute",top:0,left:0,width:"100%",height:"100%",display:"flex",alignItems:"center",justifyContent:"center"}}>
        {children}
      </div>
    </div>
  );
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
function App(){
  const [state,setState]=useState(loadState);
  const [tab,setTab]=useState("home");
  const [phase,setPhase]=useState(1);
  const [openStep,setOpenStep]=useState(null);
  const [showNote,setShowNote]=useState(null);
  const [noteText,setNoteText]=useState("");
  const [flash,setFlash]=useState(null);

  useEffect(()=>saveState(state),[state]);

  const toggleSub=(stepId,subId)=>{
    const key=`${stepId}_${subId}`;
    const now={...state,[key]:!state[key]};
    setState(now);
    // auto-complete step if all subs done
    const step=STEPS.find(s=>s.id===stepId);
    const allDone=step.substeps.every(ss=>now[`${stepId}_${ss.id}`]);
    if(allDone&&!state[`done_${stepId}`]){
      setState(p=>({...p,[`done_${stepId}`]:true,done_at_${stepId}:Date.now()}));
      setFlash(stepId);
      setTimeout(()=>setFlash(null),2000);
    }
  };

  const toggleStepDone=(stepId)=>{
    const key=`done_${stepId}`;
    const isDone=!state[key];
    const updates={[key]:isDone};
    if(isDone) updates[`done_at_${stepId}`]=Date.now();
    setState(p=>({...p,...updates}));
    if(isDone){setFlash(stepId);setTimeout(()=>setFlash(null),2000);}
  };

  const saveNote=(stepId)=>{
    setState(p=>({...p,[`note_${stepId}`]:noteText}));
    setShowNote(null);
  };

  // Computed stats
  const doneCount=STEPS.filter(s=>state[`done_${s.id}`]).length;
  const pct=doneCount/STEPS.length;
  const phaseDone=(pid)=>STEPS.filter(s=>s.phase===pid&&state[`done_${s.id}`]).length;
  const phaseTotal=(pid)=>STEPS.filter(s=>s.phase===pid).length;

  const nextStep=STEPS.find(s=>!state[`done_${s.id}`]);
  const freedMonthly=STEPS.filter(s=>state[`done_${s.id}`]&&s.impactType==="monthly").reduce((a,s)=>a+s.impactVal,0);
  const savedAnnual=STEPS.filter(s=>state[`done_${s.id}`]&&s.impactType==="annual").reduce((a,s)=>a+s.impactVal,0);

  const openNote=(stepId,e)=>{e.stopPropagation();setNoteText(state[`note_${stepId}`]||"");setShowNote(stepId)};

  return(
    <div style={{maxWidth:480,margin:"0 auto",position:"relative",minHeight:"100vh"}}>
      {/* Flash celebration */}
      {flash&&(
        <div className="pop" style={{position:"fixed",top:"50%",left:"50%",transform:"translate(-50%,-50%)",
          background:"#1A4A42",color:"#fff",borderRadius:20,padding:"20px 32px",
          textAlign:"center",zIndex:999,fontSize:18,fontWeight:700,boxShadow:"0 20px 60px rgba(0,0,0,.3)"}}>
          ✅ Step Complete!<br/>
          <span style={{fontSize:13,fontWeight:400,opacity:.85}}>Great work. Keep going.</span>
        </div>
      )}

      {/* Note modal */}
      {showNote&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",display:"flex",alignItems:"flex-end",zIndex:200}}
          onClick={()=>setShowNote(null)}>
          <div style={{background:"#fff",borderRadius:"20px 20px 0 0",padding:20,width:"100%",maxWidth:480,margin:"0 auto"}}
            onClick={e=>e.stopPropagation()}>
            <div style={{fontWeight:700,fontSize:15,marginBottom:12}}>📝 Notes for Step {showNote}</div>
            <textarea value={noteText} onChange={e=>setNoteText(e.target.value)}
              style={{width:"100%",minHeight:100,border:"1.5px solid #E5E5EA",borderRadius:10,padding:10,
              fontSize:13,fontFamily:"inherit",resize:"vertical"}}
              placeholder="Add your notes here..."/>
            <div style={{display:"flex",gap:10,marginTop:12}}>
              <button onClick={()=>setShowNote(null)} style={{flex:1,padding:"10px 0",border:"1.5px solid #E5E5EA",borderRadius:10,background:"#fff",fontSize:13,cursor:"pointer"}}>Cancel</button>
              <button onClick={()=>saveNote(showNote)} style={{flex:1,padding:"10px 0",background:"#1A4A42",color:"#fff",border:"none",borderRadius:10,fontSize:13,fontWeight:600,cursor:"pointer"}}>Save Note</button>
            </div>
          </div>
        </div>
      )}

      {/* Screens */}
      {tab==="home"&&<HomeScreen pct={pct} doneCount={doneCount} nextStep={nextStep}
        freedMonthly={freedMonthly} savedAnnual={savedAnnual} phaseDone={phaseDone} phaseTotal={phaseTotal}
        setTab={setTab} setPhase={setPhase}/>}

      {tab==="steps"&&<StepsScreen phase={phase} setPhase={setPhase} state={state}
        openStep={openStep} setOpenStep={setOpenStep} toggleSub={toggleSub}
        toggleStepDone={toggleStepDone} openNote={openNote} phaseDone={phaseDone} phaseTotal={phaseTotal}/>}

      {tab==="wins"&&<WinsScreen state={state} freedMonthly={freedMonthly} savedAnnual={savedAnnual}/>}

      {/* Bottom nav */}
      <nav className="bottom-nav">
        {[
          {id:"home",icon:"🏠",label:"Home"},
          {id:"steps",icon:"📋",label:"Steps"},
          {id:"wins",icon:"🏆",label:"Wins"},
        ].map(n=>(
          <button key={n.id} className={`nav-btn`} onClick={()=>setTab(n.id)}
            style={{color:tab===n.id?"#1A4A42":"#999"}}>
            <span className="icon">{n.icon}</span>
            <span className="label" style={{fontWeight:tab===n.id?700:500}}>{n.label}</span>
          </button>
        ))}
      </nav>
    </div>
  );
}

// ─── STEPS SCREEN ─────────────────────────────────────────────────────────────
function StepsScreen({phase,setPhase,state,openStep,setOpenStep,toggleSub,toggleStepDone,openNote,phaseDone,phaseTotal}){
  const phaseSteps=STEPS.filter(s=>s.phase===phase);
  const currentPhase=PHASES.find(p=>p.id===phase);

  return(
    <div className="screen">
      {/* Phase tabs */}
      <div style={{overflowX:"auto",display:"flex",background:"#fff",borderBottom:"1px solid #F0F0F0",
        WebkitOverflowScrolling:"touch",scrollbarWidth:"none"}}>
        {PHASES.map(p=>{
          const done=phaseDone(p.id),total=phaseTotal(p.id);
          const active=p.id===phase;
          return(
            <button key={p.id} onClick={()=>setPhase(p.id)}
              style={{flexShrink:0,padding:"10px 14px",background:"none",border:"none",cursor:"pointer",
              borderBottom:active?`3px solid ${p.color}`:"3px solid transparent",
              color:active?p.color:"#888",fontWeight:active?700:500,fontSize:11,
              display:"flex",flexDirection:"column",alignItems:"center",gap:2,minWidth:60}}>
              <span style={{fontSize:18}}>{p.emoji}</span>
              <span style={{fontSize:9,letterSpacing:.03}}>{done}/{total}</span>
            </button>
          );
        })}
      </div>

      {/* Phase header */}
      <div style={{padding:"14px 16px 8px",background:currentPhase.light}}>
        <div style={{fontWeight:700,fontSize:16,color:currentPhase.color}}>{currentPhase.emoji} {currentPhase.name}</div>
        <div style={{fontSize:12,color:"#666",marginTop:2}}>{phaseDone(phase)} of {phaseTotal(phase)} steps complete</div>
      </div>

      {/* Steps */}
      {phaseSteps.map(step=>{
        const isDone=!!state[`done_${step.id}`];
        const subsDone=step.substeps.filter(ss=>state[`${step.id}_${ss.id}`]).length;
        const subsPct=subsDone/step.substeps.length;
        const isOpen=openStep===step.id;
        const hasNote=!!state[`note_${step.id}`];
        const color=getPhaseColor(step.phase);
        const light=getPhaseLight(step.phase);

        return(
          <div key={step.id} className="step-card" style={{opacity:isDone?.85:1}}>
            {/* Header */}
            <div className="step-header" onClick={()=>setOpenStep(isOpen?null:step.id)}
              style={{background:isDone?light:"#fff"}}>
              <div style={{width:34,height:34,borderRadius:10,background:isDone?color:"#E5E5EA",
                display:"flex",alignItems:"center",justifyContent:"center",
                fontWeight:800,fontSize:13,color:isDone?"#fff":"#999",flexShrink:0}}>
                {isDone?"✓":step.id}
              </div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontWeight:600,fontSize:14,color:isDone?color:"#1C1C1E",
                  textDecoration:isDone?"line-through":"none",marginBottom:3}}>
                  {step.title}
                </div>
                <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
                  {step.impactVal>0&&(
                    <span style={{fontSize:10,fontWeight:700,background:light,color:color,
                      padding:"2px 7px",borderRadius:10}}>
                      {step.impact}
                    </span>
                  )}
                  {!isDone&&subsDone>0&&(
                    <span style={{fontSize:10,color:"#888"}}>{subsDone}/{step.substeps.length} done</span>
                  )}
                  {hasNote&&<span style={{fontSize:10}}>📝</span>}
                </div>
              </div>
              <div style={{color:"#ccc",fontSize:16,flexShrink:0,transition:"transform .2s",
                transform:isOpen?"rotate(90deg)":"rotate(0deg)"}}>›</div>
            </div>

            {/* Body */}
            {isOpen&&(
              <div className="step-body slideup">
                {/* Progress bar */}
                {subsPct>0&&(
                  <div style={{height:3,background:"#F0F0F0",borderRadius:2,marginBottom:14,overflow:"hidden"}}>
                    <div style={{width:`${subsPct*100}%`,height:"100%",background:color,borderRadius:2,transition:"width .3s"}}/>
                  </div>
                )}

                {/* What/why */}
                <div style={{background:"#F9F9F9",borderRadius:10,padding:"10px 12px",marginBottom:12,fontSize:12,color:"#555",lineHeight:1.6}}>
                  {step.what}
                </div>

                {/* Sub-steps */}
                <div style={{marginBottom:12}}>
                  {step.substeps.map((ss,i)=>{
                    const done=!!state[`${step.id}_${ss.id}`];
                    const letter=String.fromCharCode(65+i);
                    return(
                      <div key={ss.id} className="sub-step" onClick={()=>toggleSub(step.id,ss.id)}
                        style={{cursor:"pointer",background:done?"#F0FFF4":"transparent",borderRadius:done?8:0,
                        padding:done?"8px 8px":"8px 0",transition:"all .2s"}}>
                        <div className={`cb ${done?"done":""}`}
                          style={{borderColor:done?color:"#ddd",background:done?color:"transparent"}}>
                          {done&&<span style={{color:"#fff",fontSize:12,fontWeight:700}}>✓</span>}
                        </div>
                        <div style={{flex:1}}>
                          <div style={{fontSize:10,fontWeight:700,color:color,marginBottom:1}}>{letter}</div>
                          <div style={{fontSize:13,color:done?"#2E7D32":"#333",
                            textDecoration:done?"line-through":"none",lineHeight:1.5,fontWeight:done?400:400}}>
                            {ss.text}
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </div>

                {/* Actions */}
                <div style={{display:"flex",gap:8}}>
                  <button onClick={()=>toggleStepDone(step.id)}
                    style={{flex:2,padding:"10px 0",borderRadius:10,border:"none",cursor:"pointer",fontWeight:600,
                    fontSize:13,background:isDone?"#E5E5EA":color,color:isDone?"#555":"#fff",transition:"all .2s"}}>
                    {isDone?"Mark Incomplete":"✓ Mark Complete"}
                  </button>
                  <button onClick={(e)=>openNote(step.id,e)}
                    style={{flex:1,padding:"10px 0",borderRadius:10,border:"1.5px solid #E5E5EA",
                    background:"#fff",cursor:"pointer",fontSize:13,color:"#555"}}>
                    📝 Note
                  </button>
                </div>

                {/* Existing note */}
                {state[`note_${step.id}`]&&(
                  <div style={{marginTop:10,background:"#FFFBF0",border:"1px solid #FFE082",borderRadius:10,
                    padding:"10px 12px",fontSize:12,color:"#5D4037",lineHeight:1.5}}>
                    <div style={{fontSize:10,fontWeight:700,marginBottom:4,color:"#8D6E63"}}>YOUR NOTE</div>
                    {state[`note_${step.id}`]}
                  </div>
                )}
              </div>
            )}
          </div>
        );
      })}
      <div style={{height:8}}/>
    </div>
  );
}

  );

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
